<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Agent 1 Stats</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <div>
          <h1>Agent Stats</h1>
          <p class="muted">Read-only chat health, session context diagnostics, and logs.</p>
        </div>
        <div class="button-row">
          <a class="nav-link" href="/">Chat UI</a>
          <button id="themeToggle" class="icon-button" type="button" title="Toggle theme">Light</button>
        </div>
      </header>

      <main class="admin-grid">
        <section class="panel">
          <div class="panel-header">
            <h2>Summary</h2>
            <button id="refreshStatsButton" type="button">Refresh</button>
          </div>
          <div id="summaryCards" class="metric-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Session Context</h2>
            <button id="rebuildContextButton" type="button">Rebuild Index</button>
          </div>
          <div id="contextStatus" class="results"></div>
          <div class="search-row">
            <input id="contextSearchInput" type="search" placeholder="Preview retrieved context">
            <button id="contextSearchButton" type="button">Search</button>
          </div>
          <div id="contextResults" class="results tall"></div>
        </section>

        <section class="panel">
          <h2>Personas</h2>
          <div id="personaStats" class="results"></div>
        </section>

        <section class="panel">
          <h2>Recent Sessions</h2>
          <div id="recentSessions" class="results tall"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Logs</h2>
            <button id="refreshLogsButton" type="button">Refresh</button>
          </div>
          <div id="logList" class="results logs"></div>
        </section>

        <section class="panel danger">
          <h2>Danger Zone</h2>
          <select id="clearTarget">
            <option value="memory">Legacy Memory</option>
            <option value="chats">Chats</option>
            <option value="all">All</option>
          </select>
          <input id="clearConfirmation" type="text" placeholder="Confirmation phrase">
          <button id="masterClearButton" type="button">Master Clear</button>
          <p class="muted">Required phrases: CONFIRM_CLEAR_MEMORY, CONFIRM_CLEAR_CHATS, CONFIRM_CLEAR_ALL.</p>
        </section>
      </main>
    </div>

    <div id="progressBar" class="progress floating-progress" aria-hidden="true"><span></span></div>
    <div id="toast" class="toast" role="status"></div>
    <script src="/admin.js" type="module"></script>
  </body>
</html>
