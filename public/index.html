<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Agent 1</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell chat-shell">
      <aside class="sidebar">
        <header class="brand">
          <div>
            <h1>My Agent 1</h1>
            <p>Local agent workspace</p>
          </div>
          <button id="themeToggle" class="icon-button" type="button" title="Toggle theme">Light</button>
        </header>
        <a class="nav-link" href="/admin.html">Admin controls</a>

        <section class="panel">
          <div class="panel-header">
            <h2>Persona</h2>
            <button id="newSessionButton" type="button">New</button>
          </div>
          <select id="personaSelect"></select>
          <p id="personaText" class="muted"></p>
        </section>

        <section class="panel sessions-panel">
          <div class="panel-header">
            <h2>Sessions</h2>
            <button id="refreshSessionsButton" type="button">Refresh</button>
          </div>
          <div id="sessionList" class="list"></div>
        </section>
      </aside>

      <main class="chat-area">
        <header class="chat-header">
          <div>
            <h2 id="sessionTitle">No session selected</h2>
            <p id="sessionMeta" class="muted"></p>
          </div>
          <div class="button-row">
            <button id="renameSessionButton" type="button">Rename</button>
            <button id="deleteSessionButton" type="button">Delete</button>
            <button id="clearSessionButton" type="button">Clear Chat</button>
          </div>
        </header>

        <div id="progressBar" class="progress" aria-hidden="true"><span></span></div>
        <section id="messages" class="messages"></section>

        <form id="chatForm" class="composer">
          <textarea id="messageInput" rows="3" placeholder="Ask the agent..."></textarea>
          <button type="submit">Send</button>
        </form>
      </main>

    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
